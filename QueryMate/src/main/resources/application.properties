spring.application.name=QueryMate

server.port=${PORT:8080}

# Database connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool settings for cloud deployments
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.keepalive-time=300000

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:querymate_super_secure_jwt_secret_key_2025!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Google Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL}
gemini.temperature=${GEMINI_TEMPERATURE}
gemini.max-tokens=${GEMINI_MAX_TOKENS}
gemini.project-id=${GEMINI_PROJECT_ID}

# Query Execution Settings
query.max-rows=${QUERY_MAX_ROWS}
query.timeout-seconds=${QUERY_TIMEOUT_SECONDS}
query.allow-modifications=${QUERY_ALLOW_MODIFICATIONS}

app.crypto.secret=${CRYPTO_SECRET}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# Logging
logging.level.com.querymate.QueryMate.service.DatabaseConnectionService=DEBUG

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

spring.data.mongodb.uri=${MONGO_URI}
